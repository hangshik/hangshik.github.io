<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="author" content="Math Homepage Board">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <title>자유 게시판</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #e9ecef;
      padding: 1rem;
      margin: 0;
      font-weight: 500; /* 메인 디자인의 굵은 느낌 유지 */
    }
    .main-content {
      padding: 1.5rem;
      background: #fff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      max-width: 700px; /* 게시판에 적합한 너비 */
      margin: 2rem auto;
      border-radius: 12px;
    }
    .logo {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 700;
      border-bottom: 3px solid #007bff;
      padding-bottom: 1rem;
      margin-bottom: 1.5rem;
      text-decoration: none;
      display: block;
      color: #333;
    }
    .logo em { color: #007bff; font-style: normal; }

    /* 게시판 스타일 */
    .board-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .board-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #333;
    }
    .board-title i { color: #007bff; margin-right: 8px; }

    /* 글쓰기 영역 */
    .write-box {
      background: #f8f9fa;
      padding: 1.5rem;
      border-radius: 10px;
      margin-bottom: 2rem;
      border: 1px solid #dee2e6;
    }
    .form-label { font-size: 0.9rem; color: #555; margin-bottom: 5px; }
    .form-control {
      border-radius: 6px;
      border: 1px solid #ced4da;
      padding: 0.7rem;
      font-weight: 400;
    }
    .form-control:focus {
      border-color: #007bff;
      box-shadow: 0 0 0 0.2rem rgba(0,123,255,0.1);
    }
    .btn-submit {
      background: #007bff;
      border: none;
      font-weight: 700;
      padding: 0.8rem;
      border-radius: 8px;
      font-size: 1.1rem;
      margin-top: 10px;
    }
    .btn-submit:hover { background: #0056b3; }

    /* 게시글 목록 */
    .post-item { 
      background: #fff;
      border-bottom: 1px solid #eee;
      padding: 1.2rem 0.5rem;
      transition: background 0.2s;
    }
    .post-item:last-child { border-bottom: none; }
    .post-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .post-author {
      font-weight: 700;
      color: #007bff;
      font-size: 1.05rem;
    }
    .post-date {
      font-size: 0.85rem;
      color: #999;
      font-weight: 400;
    }
    .post-content {
      font-weight: 400;
      color: #444;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* 로딩 및 에러 */
    .status-msg { text-align: center; padding: 2rem; color: #666; }

    @media (max-width: 576px) {
      .main-content { margin: 1rem auto; padding: 1rem; }
      .logo { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="main-content">
  <a href="index.html" class="logo">자유 게시판</a>

  <div class="board-header">
    <div class="board-title"><i class="fas fa-edit"></i> 메시지 남기기</div>
    <button class="btn btn-sm btn-outline-secondary" onclick="getPosts()"><i class="fas fa-sync-alt"></i> 새로고침</button>
  </div>
  
  <div class="write-box">
    <div class="mb-3">
      <input type="text" id="name" class="form-control" placeholder="작성자 성함">
    </div>
    <div class="mb-3">
      <textarea id="content" class="form-control" rows="3" placeholder="내용을 입력해주세요."></textarea>
    </div>
    <button onclick="writePost()" id="submitBtn" class="btn btn-primary btn-submit w-100">등록하기</button>
  </div>

  <div id="posts">
    <div class="status-msg">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-2">데이터를 불러오는 중입니다...</p>
    </div>
  </div>
</div>

<script>
  // 본인의 Google Apps Script 웹 앱 URL을 입력하세요.
  const API_URL = 'https://script.google.com/macros/s/AKfycbzGLpEm3K87Nfwn18wfGplsdfxdrjn_2my-9hzaQHT2AnsRsFiSDbZtH0H3XIsAQD5J/exec';

  // 게시글 가져오기
  async function getPosts() {
    const container = document.getElementById('posts');
    try {
      const response = await fetch(API_URL);
      const data = await response.json();
      
      if (data.length === 0) {
        container.innerHTML = "<div class='status-msg'>아직 게시글이 없습니다. 첫 글을 남겨보세요!</div>";
        return;
      }

      container.innerHTML = data.reverse().map(post => `
        <div class="post-item">
          <div class="post-header">
            <span class="post-author"><i class="fas fa-user-circle"></i> ${post.name}</span>
            <span class="post-date">${post.date}</span>
          </div>
          <div class="post-content">${post.content}</div>
        </div>
      `).join('');
    } catch (error) {
      container.innerHTML = "<div class='alert alert-danger'>데이터 로딩에 실패했습니다. API 설정을 확인해주세요.</div>";
    }
  }

  // 게시글 등록
  async function writePost() {
    const name = document.getElementById('name').value;
    const content = document.getElementById('content').value;
    const btn = document.getElementById('submitBtn');

    if (!name || !content) {
      alert("이름과 내용을 모두 입력해 주세요.");
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 등록 중...';

    try {
      await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ name, content })
      });
      document.getElementById('name').value = '';
      document.getElementById('content').value = '';
      alert("등록되었습니다.");
      getPosts(); 
    } catch (error) {
      alert("등록에 실패했습니다. 다시 시도해 주세요.");
    } finally {
      btn.disabled = false;
      btn.innerText = "등록하기";
    }
  }

  // 페이지 접속 시 목록 자동 로드
  window.onload = getPosts;
</script>

</body>
</html>
